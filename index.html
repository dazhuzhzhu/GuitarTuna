<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎸 吉他调音器 | Guitar Tuner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        /* 调音表盘 */
        .tuner-display {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
        }

        .dial {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(145deg, #1e2a4a, #162035);
            box-shadow: 
                0 0 30px rgba(0, 0, 0, 0.5),
                inset 0 0 50px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .dial::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* 刻度 */
        .scale {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .scale-mark {
            position: absolute;
            width: 2px;
            height: 15px;
            background: rgba(255, 255, 255, 0.3);
            top: 15px;
            left: 50%;
            transform-origin: 50% 135px;
        }

        .scale-mark.center {
            height: 25px;
            width: 3px;
            background: #4ade80;
        }

        /* 指针 */
        .needle {
            position: absolute;
            width: 4px;
            height: 100px;
            background: linear-gradient(to top, #f43f5e, #fb923c);
            top: 50px;
            left: 50%;
            transform: translateX(-50%) rotate(0deg);
            transform-origin: 50% 100px;
            border-radius: 2px;
            transition: transform 0.1s ease-out;
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.5);
        }

        .needle::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* 中心显示 */
        .center-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .note-name {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 20px currentColor;
            transition: color 0.3s;
        }

        .note-name.sharp {
            font-size: 2rem;
        }

        .frequency {
            font-size: 1.2rem;
            color: #888;
            margin-top: 5px;
        }

        .cents {
            font-size: 1rem;
            margin-top: 5px;
            font-weight: bold;
        }

        .cents.sharp { color: #f43f5e; }
        .cents.flat { color: #3b82f6; }
        .cents.in-tune { color: #4ade80; }

        /* 状态指示 */
        .status {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status.in-tune { color: #4ade80; }
        .status.sharp { color: #f43f5e; }
        .status.flat { color: #3b82f6; }
        .status.listening { color: #fbbf24; }

        /* 弦按钮 */
        .strings {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 30px;
        }

        .string-btn {
            padding: 15px 5px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(145deg, #2a3a5a, #1e2a4a);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .string-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .string-btn.active {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            color: #000;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.4);
        }

        .string-btn .note {
            display: block;
            font-size: 1.2rem;
        }

        .string-btn .freq {
            display: block;
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 3px;
        }

        /* 开始按钮 */
        .start-btn {
            padding: 18px 60px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #f43f5e, #fb923c);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 30px rgba(244, 63, 94, 0.4);
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 40px rgba(244, 63, 94, 0.5);
        }

        .start-btn:disabled {
            background: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 频率条 */
        .freq-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .freq-bar-fill {
            height: 100%;
            width: 50%;
            background: linear-gradient(90deg, #3b82f6, #4ade80, #f43f5e);
            border-radius: 4px;
            transition: width 0.1s;
        }

        /* 提示 */
        .tip {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 0.85rem;
            color: #888;
            line-height: 1.6;
        }

        .tip strong {
            color: #fbbf24;
        }

        /* 响应式 */
        @media (max-width: 400px) {
            .tuner-display {
                width: 250px;
                height: 250px;
            }
            .needle { height: 80px; top: 45px; transform-origin: 50% 80px; }
            .strings { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎸 吉他调音器</h1>
        <p class="subtitle">Guitar Tuner - Web Audio API</p>

        <div class="tuner-display">
            <div class="dial">
                <div class="scale" id="scale"></div>
                <div class="needle" id="needle"></div>
                <div class="center-display">
                    <div class="note-name" id="noteName">--</div>
                    <div class="frequency" id="freqDisplay">0 Hz</div>
                    <div class="cents" id="centsDisplay"></div>
                </div>
            </div>
        </div>

        <div class="status" id="status">点击开始调音</div>

        <div class="freq-bar">
            <div class="freq-bar-fill" id="freqBar"></div>
        </div>

        <div class="strings">
            <button class="string-btn" data-string="E2" data-freq="82.41">
                <span class="note">6E</span>
                <span class="freq">82 Hz</span>
            </button>
            <button class="string-btn" data-string="A2" data-freq="110.00">
                <span class="note">5A</span>
                <span class="freq">110 Hz</span>
            </button>
            <button class="string-btn" data-string="D3" data-freq="146.83">
                <span class="note">4D</span>
                <span class="freq">147 Hz</span>
            </button>
            <button class="string-btn" data-string="G3" data-freq="196.00">
                <span class="note">3G</span>
                <span class="freq">196 Hz</span>
            </button>
            <button class="string-btn" data-string="B3" data-freq="246.94">
                <span class="note">2B</span>
                <span class="freq">247 Hz</span>
            </button>
            <button class="string-btn" data-string="E4" data-freq="329.63">
                <span class="note">1e</span>
                <span class="freq">330 Hz</span>
            </button>
        </div>

        <button class="start-btn" id="startBtn">🎤 开始调音</button>

        <div class="tip">
            <strong>💡 使用提示：</strong>点击"开始调音"后，允许麦克风权限，然后拨动吉他弦，
            调音器会自动识别音高。指针偏向左边说明音太低（偏 flat），
            偏向右边说明音太高（偏 sharp），中间绿色表示准了！
        </div>
    </div>

    <script>
        // 吉他弦频率
        const STRINGS = {
            'E2': 82.41,
            'A2': 110.00,
            'D3': 146.83,
            'G3': 196.00,
            'B3': 246.94,
            'E4': 329.63
        };

        // 音名到频率的映射（用于自动识别）
        const NOTE_FREQS = [];
        const NOTE_NAMES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
        
        // 生成 A0 到 C8 的频率表
        for (let octave = 0; octave <= 8; octave++) {
            for (let i = 0; i < 12; i++) {
                const noteNum = (octave + 1) * 12 + i;
                const freq = 440 * Math.pow(2, (noteNum - 69) / 12);
                NOTE_FREQS.push({
                    name: NOTE_NAMES[i] + octave,
                    freq: freq,
                    midi: noteNum
                });
            }
        }

        // DOM 元素
        const startBtn = document.getElementById('startBtn');
        const needle = document.getElementById('needle');
        const noteName = document.getElementById('noteName');
        const freqDisplay = document.getElementById('freqDisplay');
        const centsDisplay = document.getElementById('centsDisplay');
        const status = document.getElementById('status');
        const freqBar = document.getElementById('freqBar');
        const stringBtns = document.querySelectorAll('.string-btn');

        // 音频变量
        let audioContext;
        let analyser;
        let microphone;
        let isRunning = false;
        let selectedString = null;
        let animationId;

        // 生成刻度
        function createScale() {
            const scale = document.getElementById('scale');
            for (let i = -30; i <= 30; i++) {
                const mark = document.createElement('div');
                mark.className = 'scale-mark' + (i === 0 ? ' center' : '');
                mark.style.transform = `translateX(-50%) rotate(${i * 3}deg)`;
                scale.appendChild(mark);
            }
        }

        // 频率转音名
        function freqToNote(freq) {
            if (freq < 20) return null;
            
            const noteNum = 12 * (Math.log2(freq / 440)) + 69;
            const midi = Math.round(noteNum);
            const noteIndex = midi % 12;
            const octave = Math.floor(midi / 12) - 1;
            
            return {
                name: NOTE_NAMES[noteIndex],
                octave: octave,
                full: NOTE_NAMES[noteIndex] + octave,
                midi: midi,
                cents: Math.round((noteNum - midi) * 100)
            };
        }

        // 计算音分差
        function getCentsDiff(freq, targetFreq) {
            return 1200 * Math.log2(freq / targetFreq);
        }

        // 找到最近的弦
        function findNearestString(freq) {
            let nearest = null;
            let minDiff = Infinity;
            
            for (const [name, targetFreq] of Object.entries(STRINGS)) {
                const diff = Math.abs(freq - targetFreq);
                if (diff < minDiff) {
                    minDiff = diff;
                    nearest = name;
                }
            }
            
            return nearest;
        }

        // 更新显示
        function updateDisplay(freq, note) {
            freqDisplay.textContent = freq.toFixed(1) + ' Hz';
            
            if (!note) {
                noteName.textContent = '--';
                noteName.style.color = '#888';
                return;
            }
            
            noteName.textContent = note.name;
            
            // 确定目标频率
            const targetFreq = selectedString ? STRINGS[selectedString] : STRINGS[findNearestString(freq)];
            const cents = getCentsDiff(freq, targetFreq);
            
            // 更新指针（-50 到 +50 cents 映射到 -90° 到 +90°）
            const clampedCents = Math.max(-50, Math.min(50, cents));
            const angle = (clampedCents / 50) * 90;
            needle.style.transform = `translateX(-50%) rotate(${angle}deg)`;
            
            // 更新音分显示
            const absCents = Math.abs(Math.round(cents));
            centsDisplay.textContent = (cents > 0 ? '+' : '') + Math.round(cents) + ' 音分';
            
            // 更新状态和颜色
            if (absCents <= 3) {
                status.textContent = '✅ 准了！';
                status.className = 'status in-tune';
                centsDisplay.className = 'cents in-tune';
                noteName.style.color = '#4ade80';
                needle.style.background = 'linear-gradient(to top, #4ade80, #22c55e)';
            } else if (cents > 0) {
                status.textContent = '⏫ 音偏高，松一点';
                status.className = 'status sharp';
                centsDisplay.className = 'cents sharp';
                noteName.style.color = '#f43f5e';
                needle.style.background = 'linear-gradient(to top, #f43f5e, #fb923c)';
            } else {
                status.textContent = '⏬ 音偏低，紧一点';
                status.className = 'status flat';
                centsDisplay.className = 'cents flat';
                noteName.style.color = '#3b82f6';
                needle.style.background = 'linear-gradient(to top, #3b82f6, #60a5fa)';
            }
            
            // 更新频率条
            const barPercent = 50 + (clampedCents / 50) * 40;
            freqBar.style.width = barPercent + '%';
        }

        // 自相关函数检测音高（更准确）
        function autoCorrelate(buffer, sampleRate) {
            const SIZE = buffer.length;
            let rms = 0;
            
            // 计算 RMS
            for (let i = 0; i < SIZE; i++) {
                rms += buffer[i] * buffer[i];
            }
            rms = Math.sqrt(rms / SIZE);
            
            // 声音太小
            if (rms < 0.01) return -1;
            
            // 自相关
            let r1 = 0, r2 = SIZE - 1;
            const threshold = 0.2;
            
            for (let i = 0; i < SIZE / 2; i++) {
                if (Math.abs(buffer[i]) < threshold) { r1 = i; break; }
            }
            for (let i = 1; i < SIZE / 2; i++) {
                if (Math.abs(buffer[SIZE - i]) < threshold) { r2 = SIZE - i; break; }
            }
            
            const buf2 = buffer.slice(r1, r2);
            const c = new Array(buf2.length).fill(0);
            
            for (let i = 0; i < buf2.length; i++) {
                for (let j = 0; j < buf2.length - i; j++) {
                    c[i] += buf2[j] * buf2[j + i];
                }
            }
            
            // 找到第一个谷底
            let d = 0;
            while (c[d] > c[d + 1]) d++;
            
            let maxval = -1, maxpos = -1;
            for (let i = d; i < buf2.length; i++) {
                if (c[i] > maxval) {
                    maxval = c[i];
                    maxpos = i;
                }
            }
            
            let T0 = maxpos;
            
            // 二次插值
            const x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
            const a = (x1 + x3 - 2 * x2) / 2;
            const b = (x3 - x1) / 2;
            if (a) T0 = T0 - b / (2 * a);
            
            return sampleRate / T0;
        }

        // 处理音频
        function processAudio() {
            if (!isRunning) return;
            
            const buffer = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buffer);
            
            const freq = autoCorrelate(buffer, audioContext.sampleRate);
            
            if (freq > 0 && freq < 1000) {
                const note = freqToNote(freq);
                updateDisplay(freq, note);
            } else {
                status.textContent = '🎤 正在监听...';
                status.className = 'status listening';
            }
            
            animationId = requestAnimationFrame(processAudio);
        }

        // 开始录音
        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                microphone = audioContext.createMediaStreamSource(stream);
                microphone.connect(analyser);
                
                isRunning = true;
                startBtn.textContent = '⏹ 停止调音';
                startBtn.style.background = 'linear-gradient(135deg, #666, #444)';
                
                processAudio();
            } catch (err) {
                alert('无法访问麦克风，请确保已授权麦克风权限');
                console.error(err);
            }
        }

        // 停止录音
        function stopAudio() {
            isRunning = false;
            if (animationId) cancelAnimationFrame(animationId);
            if (microphone) microphone.disconnect();
            if (audioContext) audioContext.close();
            
            startBtn.textContent = '🎤 开始调音';
            startBtn.style.background = 'linear-gradient(135deg, #f43f5e, #fb923c)';
            status.textContent = '点击开始调音';
            status.className = 'status';
            noteName.textContent = '--';
            noteName.style.color = '#fff';
            needle.style.transform = 'translateX(-50%) rotate(0deg)';
            freqBar.style.width = '50%';
        }

        // 事件监听
        startBtn.addEventListener('click', () => {
            if (isRunning) {
                stopAudio();
            } else {
                startAudio();
            }
        });

        stringBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                stringBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedString = btn.dataset.string;
            });
        });

        // 初始化
        createScale();
    </script>
</body>
</html>
